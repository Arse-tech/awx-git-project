---
# Utilisation du plugin natif de la collection community.general
plugin: community.general.mysql_query

# Paramètres de connexion à ta base MySQL (VM 1)
login_host: 172.16.23.161
login_user: awx_lecteur
login_password: PassAWX_789!
login_db: lab_inventory

# Requête SQL pour extraire les données de tes équipements
# On récupère le hostname, l'IP, le constructeur et le rôle
query: "SELECT hostname, ip_address, vendor, role FROM devices WHERE status = 'Production'"

# --- MAPPING : Transformation des colonnes SQL en variables Ansible ---

# Définit quel champ SQL devient le nom de l'hôte dans AWX
column_to_host: hostname

# Définit les variables associées à chaque hôte
compose:
  ansible_host: ip_address
  device_vendor: vendor
  device_role: role

# Crée des groupes automatiques basés sur les valeurs des colonnes SQL
# Exemple : un groupe 'constructeur_Cisco' ou 'fonction_Server'
keyed_groups:
  - prefix: constructeur
    key: vendor
  - prefix: fonction
    key: role
