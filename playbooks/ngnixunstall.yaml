---
- hosts: all
  become: yes
  become_method: sudo
  become_user: root
  tasks:
    - name: Arrêter le service Nginx
      ansible.builtin.service:
        name: nginx
        state: stopped
      ignore_errors: yes

    - name: Désinstaller le paquet Nginx
      ansible.builtin.package:
        name: nginx
        state: absent
