---
- hosts: all
  become: yes
  become_method: sudo
  become_user: root
  tasks:
- name: Installation de Nginx (force la récupération des configs sur Debian)
      ansible.builtin.apt:
        name: nginx
        state: present
        update_cache: yes
        force_confmiss: yes  # Force la création de /etc/nginx/nginx.conf s'il manque
      when: ansible_os_family == "Debian"

    - name: Installation de Nginx pour RedHat/CentOS
      ansible.builtin.yum:
        name: nginx
        state: present
      when: ansible_os_family == "RedHat"

    # Cette étape est cruciale si le dossier a été supprimé
    - name: Vérifier la validité de la configuration Nginx
      ansible.builtin.command: nginx -t
      register: nginx_check
      ignore_errors: yes

    - name: Redémarrer et activer Nginx
      ansible.builtin.service:
        name: nginx
        state: restarted # restarted est plus sûr que started après une réinstallation
        enabled: yes
